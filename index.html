<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- ADD THIS LINE BELOW -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Gift for Mom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="gift-overlay">
  <div class="gift-wrapper">
    <h1 class="gift-title">A Special Gift for You</h1>
    <div class="gift-box" id="gift-box">
      <div class="ribbon-vertical"></div>
      <div class="ribbon-horizontal"></div>
      <div class="lid"></div>
    </div>
    <p class="tap-hint">Click the gift to unwrap!</p>
  </div>
</div>

<div id="main-content" class="hidden">
  <canvas id="celebration-canvas"></canvas>
  <div class="ambient-glow"></div>

  <main class="celebration-card">
    <h1 class="greeting">Happy Birthday, Mom</h1>
    <div class="message-section" id="main-message">
      <p>To the most incredible mother in the world.</p>
      <p>We've gathered this little celebrating crew just for you today!</p>
      <p class="tap-instruction">(Try tapping them one by one...)</p>
    </div>

    <div id="surprise-message" class="hidden">
      <h2 class="surprise-title">We love you so much!</h2>
      <p>Thank you for everything you do.</p>
    </div>
    
    <div class="animal-parade">
      <div class="animal bunny">
        <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="35" cy="30" rx="8" ry="25" fill="#ffdce5" transform="rotate(-5, 35, 30)"/>
          <ellipse cx="65" cy="30" rx="8" ry="25" fill="#ffdce5" transform="rotate(5, 65, 30)"/>
          <circle cx="50" cy="75" r="32" fill="#ffdce5"/>
          <circle cx="40" cy="70" r="3" fill="#4c2a54"/>
          <circle cx="60" cy="70" r="3" fill="#4c2a54"/>
          <polygon points="48,76 52,76 50,79" fill="#ff9ebb"/>
        </svg>
      </div>
      <div class="animal cat">
        <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
          <polygon points="20,50 40,50 25,20" fill="#ffe9db"/>
          <polygon points="60,50 80,50 75,20" fill="#ffe9db"/>
          <circle cx="50" cy="75" r="32" fill="#ffe9db"/>
          <circle cx="38" cy="72" r="3" fill="#4c2a54"/>
          <circle cx="62" cy="72" r="3" fill="#4c2a54"/>
          <polygon points="48,78 52,78 50,81" fill="#ff9ebb"/>
        </svg>
      </div>
      <div class="animal lion">
        <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="70" r="42" fill="#f59e0b"/>
          <circle cx="50" cy="75" r="28" fill="#fde68a"/>
          <circle cx="40" cy="70" r="3" fill="#4c2a54"/>
          <circle cx="60" cy="70" r="3" fill="#4c2a54"/>
          <ellipse cx="50" cy="80" rx="12" ry="8" fill="#fef3c7"/>
          <polygon points="48,77 52,77 50,81" fill="#8b5cf6"/>
        </svg>
      </div>
      <div class="animal buffalo">
        <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
          <path d="M 25 55 Q 10 30 35 45" fill="none" stroke="#52525b" stroke-width="6"/>
          <path d="M 75 55 Q 90 30 65 45" fill="none" stroke="#52525b" stroke-width="6"/>
          <circle cx="50" cy="75" r="30" fill="#a1a1aa"/>
          <circle cx="38" cy="70" r="3" fill="#27272a"/>
          <circle cx="62" cy="70" r="3" fill="#27272a"/>
          <ellipse cx="50" cy="85" rx="16" ry="12" fill="#52525b"/>
        </svg>
      </div>
      <div class="animal sheep">
        <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="75" r="24" fill="#52525b"/>
          <circle cx="42" cy="72" r="3" fill="#f4f4f5"/>
          <circle cx="58" cy="72" r="3" fill="#f4f4f5"/>
          <circle cx="35" cy="55" r="14" fill="#ffffff"/>
          <circle cx="50" cy="48" r="16" fill="#ffffff"/>
          <circle cx="65" cy="55" r="14" fill="#ffffff"/>
        </svg>
      </div>
      <div class="animal cow">
        <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="20" cy="60" rx="12" ry="6" fill="#ffffff" transform="rotate(-15, 20, 60)"/>
          <ellipse cx="80" cy="60" rx="12" ry="6" fill="#ffffff" transform="rotate(15, 80, 60)"/>
          <circle cx="50" cy="75" r="30" fill="#ffffff"/>
          <circle cx="38" cy="68" r="3" fill="#27272a"/>
          <circle cx="62" cy="68" r="3" fill="#27272a"/>
          <ellipse cx="50" cy="86" rx="18" ry="12" fill="#fbcfe8"/>
        </svg>
      </div>
    </div>
  </main>
</div>

  <script src="script.js" defer></script>

</body>
</html>
