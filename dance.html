<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dance for Mom 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #1a0a2e 0%, #2b1129 50%, #0d1b3e 100%);
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .back-btn {
      position: fixed;
      top: 1.2rem; left: 1.2rem;
      z-index: 100;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #e9d5eb;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.85rem;
      padding: 0.5rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      text-decoration: none;
    }
    .back-btn:hover { background: rgba(255,255,255,0.15); }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      color: #fff1c7;
      text-align: center;
      margin-bottom: 0.3rem;
      position: relative;
      z-index: 10;
    }
    .page-subtitle {
      font-size: 0.9rem;
      color: #c4a8d4;
      text-align: center;
      margin-bottom: 1rem;
      position: relative;
      z-index: 10;
    }

    .stage-wrap {
      position: relative;
      width: min(500px, 90vw);
      height: min(500px, 90vw);
      z-index: 5;
    }

    #dance-stage {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .note {
      position: fixed;
      font-size: 1.4rem;
      pointer-events: none;
      z-index: 20;
      animation: note-float linear forwards;
      opacity: 0;
    }
    @keyframes note-float {
      0%   { opacity: 0; transform: translateY(0) rotate(-10deg) scale(0.8); }
      15%  { opacity: 1; }
      85%  { opacity: 0.8; }
      100% { opacity: 0; transform: translateY(-160px) rotate(20deg) scale(1.1); }
    }

    .controls {
      display: flex;
      gap: 0.6rem;
      margin-top: 0.8rem;
      position: relative;
      z-index: 10;
    }
    .ctrl-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #e9d5eb;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.8rem;
      padding: 0.4rem 0.9rem;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.18); }
    .ctrl-btn.active {
      background: rgba(255,150,200,0.25);
      border-color: rgba(255,150,200,0.4);
      color: #ffb8d9;
    }

    .tap-hint {
      font-size: 0.82rem;
      color: #7c5f8a;
      text-align: center;
      margin-top: 0.5rem;
      font-style: italic;
      position: relative;
      z-index: 10;
    }

    /* sparkle canvas behind everything */
    #sparkle-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>

<canvas id="sparkle-canvas"></canvas>
<a href="index.html" class="back-btn">← Back to Gift</a>

<h1 class="page-title">Everyone's here for you, Mom 🎂</h1>
<p class="page-subtitle">Your little crew, dancing with love</p>

<div class="stage-wrap">
  <svg id="dance-stage" viewBox="-250 -250 500 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <radialGradient id="halo" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#fff1c7" stop-opacity="0.22"/>
        <stop offset="100%" stop-color="#fff1c7" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="floor-glow" cx="50%" cy="80%" r="50%">
        <stop offset="0%" stop-color="#c084fc" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>

    </defs>

    <!-- floor glow -->
    <ellipse cx="0" cy="180" rx="220" ry="40" fill="url(#floor-glow)"/>

    <!-- faint orbit ring -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="5 8"/>

    <!-- mom halo -->
    <circle cx="0" cy="0" r="70" fill="url(#halo)"/>

    <!-- ===== MOM (center) ===== -->
    <g id="mom-group" style="cursor:pointer" filter="url(#glow)">
      <!-- ground shadow -->
      <ellipse cx="0" cy="88" rx="26" ry="7" fill="rgba(0,0,0,0.2)"/>

      <ellipse cx="-10" cy="80" rx="8" ry="14" fill="#c084fc"/>
      <ellipse cx="10" cy="80" rx="8" ry="14" fill="#c084fc"/>

      <ellipse cx="-10" cy="92" rx="9" ry="4" fill="#9333ea"/>
      <ellipse cx="10" cy="92" rx="9" ry="4" fill="#9333ea"/>
      <!-- dress body -->
      <ellipse cx="0" cy="52" rx="26" ry="36" fill="#c084fc"/>

      <path d="M -26 28 Q -6 65 0 88 Q 6 65 26 28" fill="#a855f7" opacity="0.45"/>
      <!-- belt/waist detail -->
      <ellipse cx="0" cy="24" rx="18" ry="5" fill="#9333ea" opacity="0.5"/>
      <!-- arms out (reaching to hold hands) -->
      <line x1="-26" y1="28" x2="-62" y2="44" stroke="#fddcb5" stroke-width="8" stroke-linecap="round"/>
      <line x1="26" y1="28" x2="62" y2="44" stroke="#fddcb5" stroke-width="8" stroke-linecap="round"/>
      <!-- hands -->
      <circle cx="-62" cy="44" r="7" fill="#fddcb5"/>
      <circle cx="62" cy="44" r="7" fill="#fddcb5"/>
      <!-- neck -->
      <rect x="-7" y="12" width="14" height="12" rx="5" fill="#fddcb5"/>
      <!-- head -->
      <circle cx="0" cy="0" r="22" fill="#fddcb5"/>
      <!-- hair -->
      <ellipse cx="0" cy="-13" rx="22" ry="12" fill="#3b1f0a"/>
      <ellipse cx="-18" cy="-3" rx="7" ry="14" fill="#3b1f0a"/>
      <ellipse cx="18" cy="-3" rx="7" ry="14" fill="#3b1f0a"/>
      <!-- bun -->
      <circle cx="0" cy="-23" r="9" fill="#5c3010"/>
      <circle cx="0" cy="-23" r="5" fill="#7c4520"/>
      <!-- eyes -->
      <circle cx="-7" cy="-1" r="3.5" fill="#3b1f0a"/>
      <circle cx="7" cy="-1" r="3.5" fill="#3b1f0a"/>
      <circle cx="-6" cy="-2" r="1.2" fill="#fff" opacity="0.6"/>
      <circle cx="8" cy="-2" r="1.2" fill="#fff" opacity="0.6"/>
      <!-- smile -->
      <path d="M -8 7 Q 0 15 8 7" fill="none" stroke="#c06060" stroke-width="2" stroke-linecap="round"/>
      <!-- bindi -->
      <circle cx="0" cy="-9" r="2.5" fill="#ff4d6d"/>
      <!-- crown -->
      <path d="M -14 -21 L -10 -33 L 0 -28 L 10 -33 L 14 -21 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="1.2"/>
      <circle cx="-10" cy="-33" r="3" fill="#ff9ebb"/>
      <circle cx="0" cy="-28" r="3" fill="#a3e635"/>
      <circle cx="10" cy="-33" r="3" fill="#67e8f9"/>
    </g>

    <!-- hand-holding lines (drawn before animals so they appear behind) -->
    <g id="hand-lines"></g>

    <!-- animals rendered here by JS -->
    <g id="animals-group"></g>

  </svg>
</div>

<div class="controls">
  <button class="ctrl-btn" id="btn-slow">🐢 Slow</button>
  <button class="ctrl-btn active" id="btn-normal">🎵 Normal</button>
  <button class="ctrl-btn" id="btn-party">🔥 Party!</button>
</div>
<p class="tap-hint">Tap an animal for a solo spin!</p>

let revSecs = SPEEDS.normal;

      <ellipse cx="11" cy="93" rx="11" ry="5" fill="${acc}"/>
      <ellipse cx="0" cy="51" rx="26" ry="32" fill="${col}"/>
      <ellipse cx="0" cy="59" rx="15" ry="21" fill="#e4e4e7"/>

}

// =============================================
// BUILD ANIMAL ELEMENTS IN SVG
// =============================================
const animalsGroup = document.getElementById('animals-group');
const handLinesGroup = document.getElementById('hand-lines');

// Create hand-holding lines (N lines connecting adjacent animals)
const handLines = [];
for (let i = 0; i < N; i++) {
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('stroke', 'rgba(255,210,230,0.4)');
  line.setAttribute('stroke-width', '4');
  line.setAttribute('stroke-linecap', 'round');
  handLinesGroup.appendChild(line);
  handLines.push(line);
}

// Create animal groups
ANIMALS.forEach((a, i) => {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.id = `a-${a.id}`;
  g.setAttribute('cursor', 'pointer');
  g.innerHTML = `<g transform="scale(${S})">${buildAnimal(a.id, a.col, a.acc)}</g>`;
  animalsGroup.appendChild(g);

  g.addEventListener('click', () => {
    if (soloIdx === i) { soloIdx = null; clearTimeout(soloTimer); return; }
    soloIdx = i;
    clearTimeout(soloTimer);
    spawnNotes(4);
    soloTimer = setTimeout(() => { soloIdx = null; }, 3500);
  });
});

// =============================================
// POSITIONS  — computed each frame
// Animals orbit at ORBIT_R, bob up/down sinusoidally
// =============================================
const positions = new Array(N).fill(0).map(() => ({ x: 0, y: 0 }));

function getPos(i, gAngle, t) {
  // Each animal spaced evenly around the circle
  const a = (i / N) * 2 * Math.PI + gAngle;
  const x = Math.cos(a) * ORBIT_R;
  // Y on orbit + a little bounce, each animal slightly out of phase
  const y = Math.sin(a) * ORBIT_R + Math.sin(t * 3.5 + (i / N) * Math.PI * 2) * 10;
  return { x, y, a };
}

// =============================================
// ANIMATION LOOP
// =============================================
function tick(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  // Slow down whole circle when someone is doing a solo
  globalAngle += dt * (2 * Math.PI / revSecs) * (soloIdx !== null ? 0.2 : 1);

  const t = ts / 1000;

  ANIMALS.forEach((a, i) => {
    const { x, y } = getPos(i, globalAngle, t);
    positions[i] = { x, y };

    const el = document.getElementById(`a-${a.id}`);
    if (!el) return;

    let rot = 0;
    let sc = 1;

    if (soloIdx === i) {
      // spin fast and grow a little
      rot = t * 300;
      sc = 1.2 + Math.sin(t * 10) * 0.08;
    } else if (currentSpeed === 'party') {
      sc = 1 + Math.sin(t * 7 + i) * 0.05;
    }

    el.setAttribute('transform', `translate(${x},${y}) rotate(${rot}) scale(${sc})`);
  });

  // Update hand-holding lines between adjacent animals
  for (let i = 0; i < N; i++) {
    const j = (i + 1) % N;
    const p1 = positions[i], p2 = positions[j];
    handLines[i].setAttribute('x1', p1.x); handLines[i].setAttribute('y1', p1.y);
    handLines[i].setAttribute('x2', p2.x); handLines[i].setAttribute('y2', p2.y);
  }

  // Mom gentle sway
  const momSway = Math.sin(t * 1.6) * 5;
  const momBob  = Math.sin(t * 3.2) * 4;
  document.getElementById('mom-group').setAttribute('transform', `translate(${momSway},${momBob})`);

  requestAnimationFrame(tick);
}

requestAnimationFrame(tick);

// =============================================
// SPEED BUTTONS
// =============================================
function setSpeed(s) {
  currentSpeed = s;
  revSecs = SPEEDS[s];
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${s}`).classList.add('active');
  if (s === 'party') spawnNotes(8);
}
document.getElementById('btn-slow').addEventListener('click', () => setSpeed('slow'));
document.getElementById('btn-normal').addEventListener('click', () => setSpeed('normal'));
document.getElementById('btn-party').addEventListener('click', () => setSpeed('party'));

// =============================================
// MOM CLICK — everyone cheers
// =============================================
document.getElementById('mom-group').addEventListener('click', () => {
  spawnNotes(7);
});

// =============================================
// FLOATING MUSIC NOTES
// =============================================
const NOTES = ['♪','♫','♬','🎵','🎶'];
function spawnNotes(count) {
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const n = document.createElement('div');
      n.className = 'note';
      n.textContent = NOTES[Math.floor(Math.random() * NOTES.length)];
      n.style.left = (15 + Math.random() * 70) + 'vw';
      n.style.top  = (25 + Math.random() * 45) + 'vh';
      n.style.animationDuration = (1.4 + Math.random() * 1.4) + 's';
      n.style.color = ['#ff9ebb','#d8b4fe','#bae6fd','#fef3c7','#a3e635'][Math.floor(Math.random() * 5)];
      document.body.appendChild(n);
      setTimeout(() => n.remove(), 3000);
    }, i * 110);
  }
}
setInterval(() => spawnNotes(1), 2500);

// =============================================
// SPARKLE CANVAS (background twinkles)
// =============================================
const sc = document.getElementById('sparkle-canvas');
const sCtx = sc.getContext('2d');
function resizeSC() { sc.width = window.innerWidth; sc.height = window.innerHeight; }
resizeSC();
window.addEventListener('resize', resizeSC);

const sparkles = Array.from({ length: 55 }, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  r: Math.random() * 2 + 0.5,
  speed: Math.random() * 0.5 + 0.1,
  phase: Math.random() * Math.PI * 2,
  color: ['#ff9ebb','#d8b4fe','#bae6fd','#fef3c7','#a3e635'][Math.floor(Math.random()*5)]
}));

function drawSparkles(ts) {
  sCtx.clearRect(0, 0, sc.width, sc.height);
  const t = ts / 1000;
  sparkles.forEach(s => {
    const alpha = ((Math.sin(t * s.speed * 3 + s.phase) + 1) / 2) * 0.65;
    sCtx.globalAlpha = alpha;
    sCtx.fillStyle = s.color;
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sCtx.fill();
  });
  requestAnimationFrame(drawSparkles);
}
requestAnimationFrame(drawSparkles);
</script>
